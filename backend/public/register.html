<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NodeFlow — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080810; --surface: #0f0f1a; --card: #13131f;
      --border: #1e1e30; --accent: #7c6fff; --accent2: #ff6b9d;
      --accent3: #4fffb0; --text: #e8e8f0; --muted: #6b6b8a;
      --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; flex-direction: column; }
    header { position: sticky; top: 0; z-index: 100; background: rgba(8,8,16,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0 2rem; }
    nav { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .logo { font-family: var(--font-head); font-weight: 800; font-size: 1.4rem; letter-spacing: -0.03em; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .nav-links { display: flex; gap: 0.25rem; list-style: none; align-items: center; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 0.4rem 0.85rem; border-radius: 6px; transition: all 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--border); }
    .nav-cta { background: var(--accent) !important; color: #fff !important; padding: 0.45rem 1.1rem !important; }
    .nav-cta:hover { background: #6a5eee !important; }

    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; position: relative; }
    .glow-l { position: fixed; width: 400px; height: 400px; border-radius: 50%; pointer-events: none; z-index: 0; background: radial-gradient(circle, rgba(255,107,157,0.1) 0%, transparent 70%); top: 10%; right: -10%; }
    .glow-r { position: fixed; width: 400px; height: 400px; border-radius: 50%; pointer-events: none; z-index: 0; background: radial-gradient(circle, rgba(79,255,176,0.07) 0%, transparent 70%); bottom: 10%; left: -10%; }

    .form-card { position: relative; z-index: 1; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 24px 80px rgba(0,0,0,0.5); animation: fadeUp 0.5s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    .form-header { text-align: center; margin-bottom: 2rem; }
    .form-icon { width: 52px; height: 52px; border-radius: 14px; margin: 0 auto 1rem; background: linear-gradient(135deg, var(--accent2), var(--accent3)); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
    .form-header h1 { font-family: var(--font-head); font-size: 1.6rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 0.35rem; }
    .form-header p { font-size: 0.9rem; color: var(--muted); }

    .field { margin-bottom: 1.1rem; }
    label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--muted); margin-bottom: 0.5rem; letter-spacing: 0.02em; }
    input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; color: var(--text); font-family: var(--font-body); font-size: 0.95rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,111,255,0.15); }
    input::placeholder { color: var(--muted); }

    .strength-bar { display: flex; gap: 4px; margin-top: 0.5rem; }
    .strength-seg { flex: 1; height: 3px; border-radius: 3px; background: var(--border); transition: background 0.3s; }
    .strength-label { font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem; }

    .btn-submit { width: 100%; padding: 0.85rem; border-radius: 10px; background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff; border: none; font-family: var(--font-body); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,107,157,0.3); filter: brightness(1.1); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .divider { display: flex; align-items: center; gap: 1rem; color: var(--muted); font-size: 0.8rem; margin: 1.25rem 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .alt-link { text-align: center; font-size: 0.88rem; color: var(--muted); }
    .alt-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .alt-link a:hover { text-decoration: underline; }

    .alert { padding: 0.75rem 1rem; border-radius: 10px; font-size: 0.88rem; margin-bottom: 1rem; display: none; }
    .alert-error { background: rgba(255,80,80,0.12); border: 1px solid rgba(255,80,80,0.3); color: #ff8080; }
    .alert-success { background: rgba(79,255,176,0.1); border: 1px solid rgba(79,255,176,0.3); color: var(--accent3); }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/home" class="logo">NodeFlow</a>
      <ul class="nav-links">
        <li><a href="/home">Home</a></li>
        <li><a href="/about">About</a></li>
        <li><a href="/gallery">Gallery</a></li>
        <li><a href="/api-tester">API Tester</a></li>
        <li><a href="/login">Login</a></li>
        <li><a href="/register" class="nav-cta active">Register</a></li>
      </ul>
    </nav>
  </header>

  <div class="glow-l"></div>
  <div class="glow-r"></div>

  <main>
    <div class="form-card">
      <div class="form-header">
        <div class="form-icon">✨</div>
        <h1>Create account</h1>
        <p>Join NodeFlow today — it's free</p>
      </div>

      <div class="alert alert-error" id="errMsg"></div>
      <div class="alert alert-success" id="okMsg"></div>

      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" placeholder="Jane Smith" autocomplete="name"/>
      </div>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)"/>
        <div class="strength-bar">
          <div class="strength-seg" id="s1"></div>
          <div class="strength-seg" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>

      <button class="btn-submit" id="regBtn" onclick="handleRegister()">
        Create Account →
      </button>

      <div class="divider">or</div>
      <div class="alt-link">Already have an account? <a href="/login">Sign in</a></div>
    </div>
  </main>

  <script>
    function checkStrength(val) {
      const segs = [document.getElementById('s1'),document.getElementById('s2'),document.getElementById('s3'),document.getElementById('s4')];
      const label = document.getElementById('strengthLabel');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const colors = ['#ff5050','#ff9040','#ffd040','#4fffb0'];
      const labels = ['','Weak','Fair','Good','Strong'];
      segs.forEach((s,i) => s.style.background = i < score ? colors[score-1] : 'var(--border)');
      label.textContent = val.length ? labels[score] : '';
      label.style.color = score > 0 ? colors[score-1] : 'var(--muted)';
    }

    async function handleRegister() {
      const btn = document.getElementById('regBtn');
      const errEl = document.getElementById('errMsg');
      const okEl = document.getElementById('okMsg');
      errEl.style.display = 'none';
      okEl.style.display = 'none';

      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!name || !email || !password) {
        errEl.textContent = 'Please fill in all fields.';
        errEl.style.display = 'block'; return;
      }
      if (password.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters.';
        errEl.style.display = 'block'; return;
      }

      btn.disabled = true; btn.textContent = 'Creating account…';

      try {
        const res  = await fetch('http://localhost:5000/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || 'Registration failed.';
          errEl.style.display = 'block';
        } else {
          okEl.textContent = `Account created! Welcome, ${data.name}. Redirecting to login…`;
          okEl.style.display = 'block';
          setTimeout(() => window.location.href = '/login', 2000);
        }
      } catch (e) {
        errEl.textContent = 'Could not reach the server. Is it running on port 5000?';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false; btn.textContent = 'Create Account →';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleRegister(); });
  </script>
</body>
</html>

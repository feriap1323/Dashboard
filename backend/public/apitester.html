<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NodeFlow — API Tester</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080810; --surface: #0c0c18; --card: #13131f; --card2: #0f0f1b;
      --border: #1e1e30; --accent: #7c6fff; --accent2: #ff6b9d;
      --accent3: #4fffb0; --yellow: #ffd166; --text: #e8e8f0; --muted: #6b6b8a;
      --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif; --mono: 'JetBrains Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; flex-direction: column; }

    header { position: sticky; top: 0; z-index: 100; background: rgba(8,8,16,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0 2rem; }
    nav { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .logo { font-family: var(--font-head); font-weight: 800; font-size: 1.4rem; letter-spacing: -0.03em; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .nav-links { display: flex; gap: 0.25rem; list-style: none; align-items: center; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; padding: 0.4rem 0.85rem; border-radius: 6px; transition: all 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--border); }
    .nav-cta { background: var(--accent) !important; color: #fff !important; padding: 0.45rem 1.1rem !important; }

    /* LAYOUT */
    .container { max-width: 1400px; margin: 0 auto; padding: 2rem; display: grid; grid-template-columns: 280px 1fr; gap: 1.5rem; flex: 1; }

    /* SIDEBAR */
    .sidebar { position: sticky; top: 80px; height: fit-content; }
    .sidebar-title { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; padding-left: 0.5rem; }
    .endpoint-btn {
      width: 100%; display: flex; align-items: center; gap: 0.75rem;
      padding: 0.65rem 0.75rem; border-radius: 8px; border: none;
      background: transparent; cursor: pointer; transition: all 0.15s;
      text-align: left; margin-bottom: 0.25rem;
    }
    .endpoint-btn:hover { background: var(--card); }
    .endpoint-btn.active { background: var(--card); border: 1px solid var(--border); }
    .method-badge {
      font-family: var(--mono); font-size: 0.68rem; font-weight: 500;
      padding: 0.2rem 0.5rem; border-radius: 5px; min-width: 44px; text-align: center;
    }
    .GET  { background: rgba(79,255,176,0.15); color: var(--accent3); }
    .POST { background: rgba(124,111,255,0.15); color: var(--accent); }
    .PUT  { background: rgba(255,209,102,0.15); color: var(--yellow); }
    .DEL  { background: rgba(255,107,157,0.15); color: var(--accent2); }
    .endpoint-path { font-family: var(--mono); font-size: 0.82rem; color: var(--text); }
    .endpoint-desc { font-size: 0.75rem; color: var(--muted); margin-top: 0.1rem; }

    /* MAIN PANEL */
    .panel { display: flex; flex-direction: column; gap: 1.25rem; }

    .panel-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; }

    .panel-card h2 { font-family: var(--font-head); font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.6rem; }

    .url-bar { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1rem; }
    .url-method { font-family: var(--mono); font-size: 0.8rem; font-weight: 600; padding: 0.6rem 1rem; border-radius: 8px; border: none; cursor: default; }
    .url-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.6rem 1rem; color: var(--text); font-family: var(--mono); font-size: 0.88rem; outline: none; }
    .url-input:focus { border-color: var(--accent); }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .field { margin-bottom: 0.75rem; }
    label { display: block; font-size: 0.78rem; font-weight: 500; color: var(--muted); margin-bottom: 0.4rem; }
    input, textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.65rem 0.9rem; color: var(--text); font-family: var(--font-body); font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,111,255,0.12); }
    textarea { resize: vertical; min-height: 80px; font-family: var(--mono); font-size: 0.85rem; }

    .send-btn { display: flex; align-items: center; gap: 0.5rem; padding: 0.7rem 1.5rem; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: var(--font-body); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .send-btn:hover { background: #6a5eee; box-shadow: 0 6px 20px rgba(124,111,255,0.3); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .response-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .status-badge { font-family: var(--mono); font-size: 0.8rem; padding: 0.25rem 0.7rem; border-radius: 6px; font-weight: 600; }
    .status-ok { background: rgba(79,255,176,0.15); color: var(--accent3); }
    .status-err { background: rgba(255,107,157,0.15); color: var(--accent2); }
    .status-idle { background: var(--surface); color: var(--muted); }

    pre {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 1.25rem; font-family: var(--mono);
      font-size: 0.82rem; line-height: 1.7; color: var(--text);
      overflow: auto; max-height: 380px; white-space: pre-wrap; word-break: break-all;
    }

    .base-url-note { font-size: 0.78rem; color: var(--muted); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.4rem; }
    .base-url-note code { background: var(--surface); border: 1px solid var(--border); padding: 0.15rem 0.5rem; border-radius: 5px; font-family: var(--mono); color: var(--accent3); }

    .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .copy-btn { font-size: 0.78rem; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 0.25rem 0.6rem; cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
    .copy-btn:hover { color: var(--text); border-color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/home" class="logo">NodeFlow</a>
      <ul class="nav-links">
        <li><a href="/home">Home</a></li>
        <li><a href="/about">About</a></li>
        <li><a href="/gallery">Gallery</a></li>
        <li><a href="/api-tester" class="active">API Tester</a></li>
        <li><a href="/login">Login</a></li>
        <li><a href="/register" class="nav-cta">Register</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-title">Endpoints</div>

      <button class="endpoint-btn active" onclick="selectEndpoint('login')">
        <span class="method-badge POST">POST</span>
        <div><div class="endpoint-path">/login</div><div class="endpoint-desc">Sign in user</div></div>
      </button>
      <button class="endpoint-btn" onclick="selectEndpoint('signup')">
        <span class="method-badge POST">POST</span>
        <div><div class="endpoint-path">/signup</div><div class="endpoint-desc">Register user</div></div>
      </button>
      <button class="endpoint-btn" onclick="selectEndpoint('getUsers')">
        <span class="method-badge GET">GET</span>
        <div><div class="endpoint-path">/users</div><div class="endpoint-desc">All users</div></div>
      </button>
      <button class="endpoint-btn" onclick="selectEndpoint('getUser')">
        <span class="method-badge GET">GET</span>
        <div><div class="endpoint-path">/users/:id</div><div class="endpoint-desc">User by ID</div></div>
      </button>
      <button class="endpoint-btn" onclick="selectEndpoint('updateUser')">
        <span class="method-badge PUT">PUT</span>
        <div><div class="endpoint-path">/users/:id</div><div class="endpoint-desc">Update user</div></div>
      </button>
      <button class="endpoint-btn" onclick="selectEndpoint('deleteUser')">
        <span class="method-badge DEL">DEL</span>
        <div><div class="endpoint-path">/users/:id</div><div class="endpoint-desc">Delete user</div></div>
      </button>
    </aside>

    <!-- MAIN PANEL -->
    <div class="panel">
      <div class="panel-card">
        <h2 id="panelTitle">🔑 Login</h2>
        <div class="base-url-note">Base URL: <code>http://localhost:5000</code></div>

        <div class="url-bar">
          <span class="url-method POST method-badge" id="methodBadge">POST</span>
          <input class="url-input" id="urlInput" value="http://localhost:5000/login" readonly/>
        </div>

        <!-- Dynamic Fields -->
        <div id="fieldsArea">
          <!-- rendered by JS -->
        </div>

        <button class="send-btn" id="sendBtn" onclick="sendRequest()">
          ▶ Send Request
        </button>
      </div>

      <!-- RESPONSE -->
      <div class="panel-card">
        <div class="response-header">
          <h2 style="margin:0">Response</h2>
          <div style="display:flex;gap:0.5rem;align-items:center">
            <span class="status-badge status-idle" id="statusBadge">—</span>
            <button class="copy-btn" onclick="copyResponse()">Copy</button>
          </div>
        </div>
        <pre id="responseBox">// Response will appear here…</pre>
      </div>
    </div>
  </div>

  <script>
    const ENDPOINTS = {
      login:      { method: 'POST', path: '/login',      fields: ['email','password'] },
      signup:     { method: 'POST', path: '/signup',     fields: ['name','email','password'] },
      getUsers:   { method: 'GET',  path: '/users',      fields: [] },
      getUser:    { method: 'GET',  path: '/users/:id',  fields: ['id'] },
      updateUser: { method: 'PUT',  path: '/users/:id',  fields: ['id','name','email'] },
      deleteUser: { method: 'DELETE', path: '/users/:id', fields: ['id'] },
    };

    const BASE = 'http://localhost:5000';
    let current = 'login';

    function selectEndpoint(key) {
      current = key;
      const ep = ENDPOINTS[key];
      document.querySelectorAll('.endpoint-btn').forEach(b => b.classList.remove('active'));
      event.currentTarget.classList.add('active');

      const titles = { login:'🔑 Login', signup:'✨ Register', getUsers:'👥 Get All Users', getUser:'👤 Get User by ID', updateUser:'✏️ Update User', deleteUser:'🗑️ Delete User' };
      document.getElementById('panelTitle').textContent = titles[key];

      const badge = document.getElementById('methodBadge');
      const methodClass = { GET:'GET', POST:'POST', PUT:'PUT', DELETE:'DEL' }[ep.method];
      badge.className = `url-method method-badge ${methodClass}`;
      badge.textContent = ep.method;

      renderFields(ep.fields);
      updateUrl();
      document.getElementById('responseBox').textContent = '// Response will appear here…';
      document.getElementById('statusBadge').className = 'status-badge status-idle';
      document.getElementById('statusBadge').textContent = '—';
    }

    function renderFields(fields) {
      const area = document.getElementById('fieldsArea');
      area.innerHTML = '';
      if (!fields.length) {
        area.innerHTML = '<p style="font-size:0.85rem;color:var(--muted);margin-bottom:1rem">No body required for this request.</p>';
        return;
      }
      const grid = document.createElement('div');
      grid.className = 'field-row';
      fields.forEach(f => {
        const wrap = document.createElement('div');
        wrap.className = 'field';
        const label = document.createElement('label');
        label.textContent = f.charAt(0).toUpperCase() + f.slice(1);
        const input = document.createElement('input');
        input.id = `field_${f}`;
        input.type = f === 'password' ? 'password' : 'text';
        input.placeholder = f === 'id' ? 'MongoDB ObjectId…' : `Enter ${f}…`;
        if (f === 'id') input.addEventListener('input', updateUrl);
        wrap.appendChild(label);
        wrap.appendChild(input);
        grid.appendChild(wrap);
      });
      area.appendChild(grid);
    }

    function updateUrl() {
      const ep = ENDPOINTS[current];
      const idField = document.getElementById('field_id');
      const id = idField ? idField.value || ':id' : '';
      const path = ep.path.replace(':id', id);
      document.getElementById('urlInput').value = BASE + path;
    }

    async function sendRequest() {
      const ep = ENDPOINTS[current];
      const btn = document.getElementById('sendBtn');
      const box = document.getElementById('responseBox');
      const badge = document.getElementById('statusBadge');

      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> Sending…';
      box.textContent = '// Waiting for response…';
      badge.className = 'status-badge status-idle';
      badge.textContent = '…';

      const idField = document.getElementById('field_id');
      const id = idField ? idField.value : '';
      const url = BASE + ep.path.replace(':id', id);

      const body = {};
      ep.fields.filter(f => f !== 'id').forEach(f => {
        const val = document.getElementById(`field_${f}`)?.value;
        if (val) body[f] = val;
      });

      const opts = { method: ep.method, headers: {} };
      if (ep.method !== 'GET' && Object.keys(body).length) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
      }

      try {
        const start = Date.now();
        const res = await fetch(url, opts);
        const ms = Date.now() - start;
        const data = await res.json();

        box.textContent = JSON.stringify(data, null, 2);
        badge.textContent = `${res.status} ${res.statusText} · ${ms}ms`;
        badge.className = `status-badge ${res.ok ? 'status-ok' : 'status-err'}`;
      } catch (e) {
        box.textContent = `// Error: ${e.message}\n// Is the API server running on port 5000?`;
        badge.textContent = 'Network Error';
        badge.className = 'status-badge status-err';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '▶ Send Request';
      }
    }

    function copyResponse() {
      const text = document.getElementById('responseBox').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = event.currentTarget;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 1500);
      });
    }

    // Init
    renderFields(ENDPOINTS.login.fields);
  </script>
</body>
</html>

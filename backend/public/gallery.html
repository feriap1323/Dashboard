<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NodeFlow — Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080810; --surface: #13131f; --card: #13131f; --border: #1e1e30;
      --accent: #7c6fff; --accent2: #ff6b9d; --accent3: #4fffb0;
      --text: #e8e8f0; --muted: #6b6b8a;
      --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
    }
    body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,8,16,0.85); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border); padding: 0 2rem;
    }
    nav {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between; height: 64px;
    }
    .logo {
      font-family: var(--font-head); font-weight: 800; font-size: 1.4rem;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 0.25rem; list-style: none; align-items: center; }
    .nav-links a {
      color: var(--muted); text-decoration: none; font-size: 0.9rem;
      font-weight: 500; padding: 0.4rem 0.85rem; border-radius: 6px; transition: all 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--border); }
    .nav-cta { background: var(--accent) !important; color: #fff !important; padding: 0.45rem 1.1rem !important; }
    .nav-cta:hover { background: #6a5eee !important; }

    /* ── PAGE ── */
    .page { max-width: 1100px; margin: 0 auto; padding: 4rem 2rem; flex: 1; }

    .section-label {
      font-size: 0.78rem; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem;
    }
    h1 {
      font-family: var(--font-head); font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800; letter-spacing: -0.04em; line-height: 1.1; margin-bottom: 0.75rem;
    }
    .lead { font-size: 1rem; color: var(--muted); margin-bottom: 3rem; }

    /* ── GALLERY GRID ── */
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }
    .gallery-item {
      border-radius: 16px; overflow: hidden; position: relative;
      background: var(--surface); border: 1px solid var(--border);
      aspect-ratio: 1; cursor: pointer;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    }
    .gallery-item:nth-child(1) { grid-column: span 2; aspect-ratio: 2/1; }
    .gallery-item:nth-child(5) { grid-column: span 2; aspect-ratio: 2/1; }
    .gallery-item:hover {
      transform: scale(1.02);
      border-color: var(--accent);
      box-shadow: 0 12px 40px rgba(124,111,255,0.2);
    }
    .placeholder {
      width: 100%; height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.6rem;
    }
    .icon { font-size: 2.8rem; }
    .label { font-size: 0.8rem; color: var(--muted); font-weight: 500; letter-spacing: 0.03em; }

    .gallery-item:nth-child(1) .placeholder { background: linear-gradient(135deg, #1a1030, #2a1060); }
    .gallery-item:nth-child(2) .placeholder { background: linear-gradient(135deg, #0a1a10, #0d3020); }
    .gallery-item:nth-child(3) .placeholder { background: linear-gradient(135deg, #1a100a, #3a2010); }
    .gallery-item:nth-child(4) .placeholder { background: linear-gradient(135deg, #0a101a, #10203a); }
    .gallery-item:nth-child(5) .placeholder { background: linear-gradient(135deg, #1a0a10, #3a1020); }
    .gallery-item:nth-child(6) .placeholder { background: linear-gradient(135deg, #101a0a, #203a10); }

    /* ── FOOTER ── */
    footer {
      text-align: center; padding: 2rem; color: var(--muted);
      font-size: 0.82rem; border-top: 1px solid var(--border); margin-top: 2rem;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- ✅ FIXED: Sahi header with /route links (pehle home.html type links the) -->
  <header>
    <nav>
      <a href="/home" class="logo">NodeFlow</a>
      <ul class="nav-links">
        <li><a href="/home">Home</a></li>
        <li><a href="/about">About</a></li>
        <li><a href="/gallery" class="active">Gallery</a></li>
        <li><a href="/api-tester">API Tester</a></li>
        <li><a href="/login">Login</a></li>
        <li><a href="/register" class="nav-cta">Register</a></li>
      </ul>
    </nav>
  </header>

  <div class="page">
    <div class="section-label">Gallery</div>
    <h1>Visual Showcase</h1>
    <p class="lead">Explore the collection below.</p>

    <div class="gallery">
      <div class="gallery-item"><div class="placeholder"><span class="icon">🌌</span><span class="label">Featured · Space</span></div></div>
      <div class="gallery-item"><div class="placeholder"><span class="icon">🌿</span><span class="label">Nature</span></div></div>
      <div class="gallery-item"><div class="placeholder"><span class="icon">🏙️</span><span class="label">City</span></div></div>
      <div class="gallery-item"><div class="placeholder"><span class="icon">🌊</span><span class="label">Ocean</span></div></div>
      <div class="gallery-item"><div class="placeholder"><span class="icon">🌄</span><span class="label">Wide · Mountains</span></div></div>
      <div class="gallery-item"><div class="placeholder"><span class="icon">🌲</span><span class="label">Forest</span></div></div>
    </div>
  </div>

  <footer>
    NodeFlow &mdash; <a href="/home">Home</a> · <a href="/about">About</a> · <a href="/gallery">Gallery</a>
  </footer>

</body>
</html>
